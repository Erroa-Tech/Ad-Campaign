<div class="fp-page">

  <!-- ── Left: Verify email form ──────────────────────────── -->
  <section class="fp-panel">
    <div class="fp-card">

      <!-- Logo -->
      <div class="logo">
        <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="44" height="44" rx="11" fill="#f97316"/>
          <g stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 10 L17.5 17.5"/>
            <path d="M10 10 L10 16 M10 10 L16 10"/>
            <path d="M34 10 L26.5 17.5"/>
            <path d="M34 10 L34 16 M34 10 L28 10"/>
            <path d="M10 34 L17.5 26.5"/>
            <path d="M10 34 L10 28 M10 34 L16 34"/>
            <path d="M34 34 L26.5 26.5"/>
            <path d="M34 34 L34 28 M34 34 L28 34"/>
          </g>
        </svg>
      </div>

      <h1 class="card-title">Verify Your Email</h1>
      <p class="card-subtitle">
        Please enter your Email details to<br>Reset Your Password
      </p>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

        <div class="field" [class.field--error]="submitted() && emailCtrl.invalid">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </span>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="hijuyed@gmail.com"
              autocomplete="email"
            />
          </div>
          @if (submitted() && emailCtrl.hasError('required')) {
            <span class="field-error">Email is required</span>
          } @else if (submitted() && emailCtrl.hasError('email')) {
            <span class="field-error">Enter a valid email address</span>
          }
        </div>

        <button type="submit" class="btn-primary" [disabled]="isLoading()">
          @if (isLoading()) {
            <span class="spinner" aria-hidden="true"></span>
            Sending…
          } @else {
            Send
          }
        </button>

      </form>

      <p class="back-link">
        <a routerLink="/auth/login">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          Back to Sign In
        </a>
      </p>

    </div>
  </section>

  <!-- ── Right: Image panel ───────────────────────────────── -->
  <img class="promo-image" src="assets/images/sign_Image.png" alt="" aria-hidden="true" />

</div>
